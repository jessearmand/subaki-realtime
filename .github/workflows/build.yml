name: Build

on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    typecheck-build:
        name: Typecheck & Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2

            - run: bun install --frozen-lockfile
            - run: bunx tsc --noEmit
            - run: bun run build
