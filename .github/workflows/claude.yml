name: Claude Code

# On-demand Claude: mention @claude in an issue, PR comment, or review to ask
# for anything — including a re-review after pushing fixes ("@claude review the
# latest changes"), which keeps the automated review in claude-code-review.yml
# down to one run per PR.

on:
    issue_comment:
        types: [created]
    pull_request_review_comment:
        types: [created]
    issues:
        types: [opened]
    pull_request_review:
        types: [submitted]

jobs:
    claude:
        # Only repo owner/members/collaborators can summon Claude — never drive-by
        # commenters (prompt-injection + token-spend guard on a public repo).
        if: |
            (
              (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
                contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
              (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
                contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
              (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
                contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
              (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
                contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
            )
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            issues: read
            id-token: write
            actions: read # lets Claude read CI results on PRs
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: Run Claude Code
              id: claude
              uses: anthropics/claude-code-action@v1
              with:
                  claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

                  # Lets Claude read CI results on PRs.
                  additional_permissions: |
                      actions: read

                  # No `prompt`: Claude follows the instructions in the comment
                  # that tagged it. See
                  # https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
                  # for claude_args options.
