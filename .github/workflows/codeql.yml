# CodeQL "Advanced" setup for JavaScript/TypeScript.
# Code scanning runs for free on PUBLIC repositories; on private repos it
# requires GitHub Advanced Security. See:
# https://docs.github.com/en/code-security/code-scanning
name: 'CodeQL Advanced'

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
    schedule:
        - cron: '30 8 * * 5'

jobs:
    analyze:
        name: Analyze (${{ matrix.language }})
        runs-on: ubuntu-latest
        permissions:
            # required for all workflows
            security-events: write
            # required to fetch internal or private CodeQL packs
            packages: read
            # only required for workflows in private repositories
            actions: read
            contents: read

        strategy:
            fail-fast: false
            matrix:
                include:
                    - language: javascript-typescript
                      build-mode: none

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: ${{ matrix.language }}
                  build-mode: ${{ matrix.build-mode }}
                  # Security-focused. Code quality is oxlint's job (and
                  # components/ui/ vendored code is intentionally excluded from it).
                  queries: security-extended

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v4
              with:
                  category: '/language:${{matrix.language}}'
