name: Oxc

on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    format:
        name: Oxfmt
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2

            - run: bun install --frozen-lockfile
            - run: bun run fmt:check

    lint:
        name: Oxlint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2

            - run: bun install --frozen-lockfile
            # --format=github surfaces findings as inline PR annotations.
            - run: bun run lint:github
