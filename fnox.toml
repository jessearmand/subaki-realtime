default_provider = "ElevenLabs"

[providers.ElevenLabs]
type = "keychain"
service = "elevenlabs"

[providers.xai]
type = "keychain"
service = "fnox"

[providers.openai]
type = "keychain"
service = "fnox"

[providers.anthropic]
type = "keychain"
service = "fnox"

[providers.mistral]
type = "keychain"
service = "fnox"

[providers.huggingface]
type = "keychain"
service = "fnox"

[secrets]
ELEVENLABS_API_KEY= { provider = "ElevenLabs", value = "ELEVENLABS_API_KEY" }
XAI_API_KEY= { provider = "xai", value = "XAI_API_KEY" }
OPENAI_API_KEY= { provider = "openai", value = "OPENAI_API_KEY" }
CLAUDE_CODE_OAUTH_TOKEN= { provider = "anthropic", value = "CLAUDE_CODE_OAUTH_TOKEN" }
MISTRAL_API_KEY= { provider = "mistral", value = "MISTRAL_API_KEY" }
HF_TOKEN= { provider = "huggingface", value = "HF_TOKEN" }
